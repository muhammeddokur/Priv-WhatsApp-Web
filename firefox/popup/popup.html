<html>
  <head>
    <meta charset="UTF-8">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: 'Inter', sans-serif;
        font-size: 12px;
        width: 270px;
        padding: 15px;
        background: linear-gradient(135deg, #090a0f 0%, #151622 100%);
        color: #e9edef;
        -moz-user-select: none;
        user-select: none;
      }
      .header-container {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 15px;
      }
      .logo-img {
        width: 32px;
        height: 32px;
        filter: drop-shadow(0 2px 8px rgba(0, 210, 255, 0.4));
      }
      .extension-title {
        font-family: 'Outfit', sans-serif;
        font-size: 18px;
        font-weight: 700;
        background: linear-gradient(to right, #00f2fe, #4facfe);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        line-height: 1.1;
      }
      .author-subtitle {
        font-size: 10px;
        color: #ffffff;
        font-weight: 600;
        margin-top: 2px;
      }
      .main-toggle-card {
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 12px;
        padding: 12px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 15px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.2);
      }
      .main-toggle-label {
        font-family: 'Outfit', sans-serif;
        font-size: 14px;
        font-weight: 600;
        color: #fff;
      }
      .section-title {
        font-family: 'Outfit', sans-serif;
        font-size: 11px;
        color: #8696a0;
        text-transform: uppercase;
        letter-spacing: 0.8px;
        margin-bottom: 10px;
      }
      #mainContent > ul {
        list-style: none;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      #mainContent > ul > li {
        position: relative;
        background: rgba(255, 255, 255, 0.02);
        border: 1px solid rgba(255, 255, 255, 0.05);
        border-radius: 10px;
        padding: 10px 12px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        flex-wrap: wrap;
        transition: all 0.2s ease;
      }
      #mainContent > ul > li:hover {
        background: rgba(255, 255, 255, 0.05);
        border-color: rgba(0, 210, 255, 0.3);
        box-shadow: 0 4px 12px rgba(0, 210, 255, 0.05);
      }
      .reveal-btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 22px;
        height: 22px;
        border: 1px solid rgba(255,255,255,0.1);
        border-radius: 50%;
        color: #8696a0;
        background-color: transparent;
        transition: all .2s;
        cursor: pointer;
        margin-right: auto;
        margin-left: 8px;
      }
      .reveal-btn:hover {
        background-color: rgba(255,255,255,0.05);
        color: #fff;
        border-color: rgba(255,255,255,0.2);
      }
      .reveal-btn.active {
        background-color: rgba(0, 210, 255, 0.1);
        color: #00d2ff;
        border-color: rgba(0, 210, 255, 0.2);
      }
      .reveal-btn svg {
        width: 14px;
        height: 14px;
      }
      input[type=checkbox] {
        height: 0;
        width: 0;
        visibility: hidden;
        position: absolute;
      }
      label {
        cursor: pointer;
        width: 34px;
        height: 18px;
        background: rgba(255, 255, 255, 0.15);
        display: inline-block;
        border-radius: 100px;
        position: relative;
        transition: background 0.25s ease;
      }
      label:after {
        content: '';
        position: absolute;
        top: 3px;
        left: 3px;
        width: 12px;
        height: 12px;
        background: #fff;
        border-radius: 50%;
        transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      }
      input:checked + label {
        background: #00d2ff;
        box-shadow: 0 0 8px rgba(0, 210, 255, 0.4);
      }
      input:checked + label:after {
        left: calc(100% - 3px);
        transform: translateX(-100%);
      }
      .collapsible {
        position: relative;
        width: 100%;
        margin: 8px 0 0 0;
        max-height: 0;
        overflow: hidden;
        transition: max-height 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        border-radius: 8px;
        z-index: 1;
        background: rgba(0, 0, 0, 0.2);
      }
      .collapsible.show {
        max-height: 250px;
        border: 1px solid rgba(255, 255, 255, 0.05);
        padding: 4px;
      }
      .var-style {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 6px;
        font-size: 11px;
        width: 100%;
      }
      .var-style button[type="reset"] {
        width: 20px;
        height: 20px;
        color: #ff453a;
        background-color: transparent;
        border: none;
        margin: 0 4px;
        display: flex;
        cursor: pointer;
        align-items: center;
        justify-content: center;
      }
      .var-style button[type="reset"] svg {
        width: 14px;
        height: 14px;
      }
      .var-style input, .var-style select {
        background: rgba(255, 255, 255, 0.07);
        border: 1px solid rgba(255, 255, 255, 0.15);
        color: #fff;
        border-radius: 4px;
        padding: 2px 6px;
        outline: none;
        transition: all 0.2s;
        height: 22px;
        font-size: 11px;
      }
      .var-style input:focus {
        border-color: #00d2ff;
        background: rgba(0, 210, 255, 0.1);
      }
      .var-style input[type="number"] {
        width: 45px;
        text-align: right;
        -webkit-appearance: textfield;
        -moz-appearance: textfield;
        appearance: textfield;
      }
      .var-style input[type=number]::-webkit-inner-spin-button, 
      .var-style input[type=number]::-webkit-outer-spin-button { 
        -webkit-appearance: none;
      }
      .var-style .unit {
        width: 20px;
        height: 22px;
        text-align: center;
        line-height: 20px;
        color: #8696a0;
        background-color: rgba(255,255,255,0.05);
        border: 1px solid rgba(255,255,255,0.15);
        border-left: none;
        border-right: none;
      }
      .var-style button[type="submit"] {
        height: 22px;
        padding: 0 8px;
        background: #00d2ff;
        color: #fff;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-weight: 500;
        transition: all 0.2s;
      }
      .var-style button[type="submit"]:hover {
        background: #0096c7;
      }
      #footer {
        margin-top: 15px;
        text-align: center;
        border-top: 1px solid rgba(255, 255, 255, 0.08);
        padding-top: 10px;
      }
      #footer p {
        font-size: 10px;
        color: #8696a0;
      }
      #footer p a {
        color: #ffffff;
        font-weight: 600;
        text-decoration: none;
      }
      #footer p a:hover {
        text-decoration: underline;
        color: #00d2ff;
      }
    </style>
